name: T113 Android 11 TWRP ZIP Build (Efe Tech Lab)

on:
  workflow_dispatch: # Manuel ateşleme butonu

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Sunucuyu Hazırla
        uses: actions/checkout@v3

      - name: Gerekli Paketleri Kur
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential zip curl libstdc++6 git python3 python-is-python3 libssl-dev repo libncurses5

      - name: Repo ve Kaynak Kodları Çek (Hata Giderilmiş)
        run: |
          mkdir build && cd build
          git config --global user.name "Efe"
          git config --global user.email "efe@tech.lab"
          
          # Derinliği 1 yaparak hızlı çekiyoruz
          repo init -u https://android.googlesource.com/platform/manifest -b android-11.0.0_r1 --depth=1
          
          mkdir .repo/local_manifests
          # T113 için gerekli tüm donanım ağaçlarını buraya ekledik
          echo '<?xml version="1.0" encoding="UTF-8"?>
          <manifest>
            <project name="AOSPT113/android_device_samsung_goyave" path="device/samsung/goyave" remote="github" revision="android-11.0" />
            <project name="AOSPT113/android_kernel_samsung_goyave" path="kernel/samsung/goyave" remote="github" revision="android-11.0" />
            <project name="AOSPT113/android_vendor_samsung_goyave" path="vendor/samsung/goyave" remote="github" revision="android-11.0" />
            <project name="AOSPT113/android_device_samsung_sc8830-common" path="device/samsung/sc8830-common" remote="github" revision="android-11.0" />
          </manifest>' > .repo/local_manifests/goyave.xml
          
          # "fatal: could not read Username" hatasını aşmak için --no-clone-bundle ekledik
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

      - name: Derlemeyi Başlat (System Image)
        run: |
          cd build
          source build/envsetup.sh
          lunch aosp_goyave-userdebug
          make systemimage -j$(nproc --all)

      - name: TWRP İçin ZIP Paketi Oluştur (10GB Hedefli)
        run: |
          mkdir output
          mkdir -p flashable_zip/META-INF/com/google/android
          cp build/out/target/product/goyave/system.img flashable_zip/
          
          # TWRP Scripti
          echo '#!/sbin/sh
          ui_print("--------------------------------------");
          ui_print("     Efe Tech Lab T113 AOSP 11      ");
          ui_print("--------------------------------------");
          ui_print("Sistem yukleniyor...");
          package_extract_file("system.img", "/dev/block/platform/sdhci-pxa.0/by-name/system");
          ui_print("Islem Basarili! Cihazi yeniden baslat.");' > flashable_zip/META-INF/com/google/android/update-binary
          
          cd flashable_zip && zip -r ../output/T113_Android11_Vanilla_V8.zip .

      - name: ZIP Dosyasını Yayınla
        uses: softprops/action-gh-release@v1
        with:
          files: output/T113_Android11_Vanilla_V8.zip
          tag_name: V8-RELEASE
          name: T113 Android 11 TWRP Flashable ZIP
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
