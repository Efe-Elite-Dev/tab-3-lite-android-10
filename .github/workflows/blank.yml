name: T113 Android 10 Build - V1
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest # Beklemeyi bitiren güncel runner
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Sistem Hazırlığı
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential zip curl libstdc++6 git python3 libssl-dev
          mkdir ~/bin && curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo

      - name: Kaynak Kodları ve Sync (Lineage 17.1)
        run: |
          export PATH=$PATH:~/bin
          repo init -u https://github.com/LineageOS/android.git -b lineage-17.1 --depth=1
          
          # Senin verdiğin 7.1 ağacını çekip V1 için hazırlıyoruz
          git clone https://github.com/TeamWin/android_device_samsung_goyave.git -b android-7.1 device/samsung/goyave
          
          # Bootloop önleyici ortak ağaç
          git clone https://github.com/samsung-sc8830/android_device_samsung_sc8830-common.git -b lineage-15.1 device/samsung/sc8830-common
          
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

      - name: Android 10 Bootloop Önleyici Yamalar
        run: |
          # V1 Yamaları: BoardConfig içindeki eski Spreadtrum kodlarını temizle
          sed -i '/TARGET_CPU_SMP := true/d' device/samsung/goyave/BoardConfig.mk
          echo "TARGET_USES_64_BIT_BINDER := true" >> device/samsung/goyave/BoardConfig.mk
          echo "PRODUCT_SOONG_NAMESPACES += device/samsung/goyave" >> device/samsung/goyave/BoardConfig.mk

      - name: Derlemeyi Başlat (V1)
        run: |
          source build/envsetup.sh
          lunch lineage_goyave-userdebug
          mka bacon -j$(nproc --all)

      - name: ROM'u Paylaş
        uses: actions/upload-artifact@v2
        with:
          name: Goyave-T113-Android10-V1
          path: out/target/product/goyave/*.zip
