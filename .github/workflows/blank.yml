name: T113 Android 11 GSI-sız Derleme (Efe Tech Lab)

on:
  workflow_dispatch: # Manuel tetikleme (Ateşle aga butonu)

jobs:
  build:
    runs-on: ubuntu-20.04
    permissions:
      contents: write

    steps:
      - name: Sunucuyu Hazırla (Esenyurt Usulü)
        uses: actions/checkout@v3

      - name: Gerekli Paketleri Kur
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential zip curl libstdc++6 git python3 python-is-python3 libssl-dev repo

      - name: Repo ve Kaynak Kodları Çek (Android 11 Vanilla)
        run: |
          mkdir android-build && cd android-build
          git config --global user.name "Efe"
          git config --global user.email "efe@tech.lab"
          # Saf Android 11 (AOSP) kodlarını çekiyoruz
          repo init -u https://android.googlesource.com/platform/manifest -b android-11.0.0_r1
          
          # Senin özel T113 (goyave) ağaçlarını ekliyoruz
          mkdir .repo/local_manifests
          echo '<?xml version="1.0" encoding="UTF-8"?>
          <manifest>
            <project name="android_device_samsung_goyave" path="device/samsung/goyave" remote="github" revision="android-11.0" />
            <project name="android_kernel_samsung_goyave" path="kernel/samsung/goyave" remote="github" revision="android-11.0" />
            <project name="android_vendor_samsung_goyave" path="vendor/samsung/goyave" remote="github" revision="android-11.0" />
          </manifest>' > .repo/local_manifests/goyave.xml
          
          repo sync -j$(nproc --all) --force-sync --no-tags --no-clone-bundle

      - name: 10GB Hedefi İçin Sistemi Hafiflet (Debloat)
        run: |
          cd android-build
          # Gereksiz Google servislerini ve dilleri sistemden ayıkla
          rm -rf vendor/google
          rm -rf packages/apps/Calendar packages/apps/Email # Bunları sonra APK ile kurarsın

      - name: Derlemeyi Başlat (Ateşle Aga!)
        run: |
          cd android-build
          source build/envsetup.sh
          lunch aosp_goyave-userdebug
          make systemimage -j$(nproc --all)

      - name: Yazılımı Paketle ve Yayınla
        uses: softprops/action-gh-release@v1
        if: success()
        with:
          files: android-build/out/target/product/goyave/system.img
          tag_name: V8-Vanilla-T113
          name: T113 Android 11 GSI-sız Mermi Sürümü
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
