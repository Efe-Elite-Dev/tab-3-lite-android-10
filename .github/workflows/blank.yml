name: T113 Android 11 TWRP ZIP Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - name: Sunucuyu Hazırla
        uses: actions/checkout@v3

      - name: Paketleri Kur
        run: sudo apt-get update && sudo apt-get install -y zip repo python3

      - name: Kaynak Kodları ve T113 Ağaçlarını Çek
        run: |
          mkdir build && cd build
          git config --global user.name "Efe"
          git config --global user.email "efe@tech.lab"
          repo init -u https://android.googlesource.com/platform/manifest -b android-11.0.0_r1
          
          mkdir .repo/local_manifests
          echo '<?xml version="1.0" encoding="UTF-8"?>
          <manifest>
            <project name="android_device_samsung_goyave" path="device/samsung/goyave" remote="github" revision="android-11.0" />
            <project name="android_kernel_samsung_goyave" path="kernel/samsung/goyave" remote="github" revision="android-11.0" />
            <project name="android_vendor_samsung_goyave" path="vendor/samsung/goyave" remote="github" revision="android-11.0" />
          </manifest>' > .repo/local_manifests/goyave.xml
          
          repo sync -j$(nproc --all) --force-sync

      - name: Derlemeyi Başlat (System Image)
        run: |
          cd build
          source build/envsetup.sh
          lunch aosp_goyave-userdebug
          make systemimage -j$(nproc --all)

      - name: TWRP İçin ZIP Paketi Oluştur (Esenyurt Özel)
        run: |
          mkdir flashable_zip
          cd flashable_zip
          # Meta-inf ve Script hazırlığı
          mkdir -p META-INF/com/google/android
          cp ../build/out/target/product/goyave/system.img .
          
          # Basit bir updater-script oluşturuyoruz
          echo '#!/sbin/sh
          ui_print("Efe Tech Lab - T113 Android 11 Yukleniyor...");
          package_extract_file("system.img", "/dev/block/platform/sdhci-pxa.0/by-name/system");
          ui_print("Islem Tamam! Reboot et aga.");' > META-INF/com/google/android/update-binary
          
          # Dosyayı mühürle
          zip -r ../T113_Android11_Vanilla_EfeTech.zip .

      - name: ZIP Dosyasını Yayınla
        uses: softprops/action-gh-release@v1
        with:
          files: T113_Android11_Vanilla_EfeTech.zip
          tag_name: V8-TWRP-ZIP
          name: T113 Android 11 TWRP Flaşlanabilir ZIP
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
