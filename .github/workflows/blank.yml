name: T113 Efe Tech Galaxy Crusher Final Deployment

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 1. Repo Dosyalarini Getir
        uses: actions/checkout@v4

      - name: 2. Gdown ve Sistem Araclarini Kur
        run: |
          sudo apt-get update
          sudo apt-get install -y zip aria2 python3-pip
          python3 -m pip install gdown --break-system-packages || python3 -m pip install gdown

      - name: 3. Imaj Dosyalarini Drive'dan Cek
        run: |
          set -e
          # gdown artik python uzerinden calisiyor, cok daha stabil
          python3 -m gdown --id "1OkFvGvI5TSQtK22Ib73xZNI1g1muBvGE" -O system.img
          python3 -m gdown --id "1ykNZsdc9DxcFtwz7SLGRSGkAro5Z25Jv" -O boot.img
          python3 -m gdown --id "1VQkPk84l9n3Uc04aYp3I_eoJIePj06E3" -O sprdcp.img
          python3 -m gdown --id "1wRd-CixOdcYhppNAksnRoNlcyoacFNLk" -O sboot2.bin
          python3 -m gdown --id "1tvkKWkinJUKKLXDwW0x2YRq5GXriqX3y" -O sboot.bin
          python3 -m gdown --id "1lWWUXpxXMihPgMbgg12wH93kXsjD-6BP" -O spl.img
          
          # Boyut kontrolü (Boş dosya inmesini engeller)
          ls -lh *.img *.bin

      - name: 4. Updater-Script Yaz ve Binary Yerlestir
        run: |
          mkdir -p output/META-INF/com/google/android
          
          # Senin scriptin (Full otomatik üretim)
          cat <<EOF > output/META-INF/com/google/android/updater-script
          ui_print("======================================");
          ui_print("     EFE TECH GALAXY CRUSHER V1      ");
          ui_print("   DATE: \$(date +'%d/%m/%Y')           ");
          ui_print("======================================");
          ui_print("[1/3] Sistem Hazirlaniyor...");
          unmount("/system");
          format("ext4", "EMMC", "/dev/block/platform/soc/by-name/system", "0", "/system");
          ui_print("[2/3] Dosyalar Yaziliyor...");
          package_extract_file("boot.img", "/dev/block/platform/soc/by-name/boot");
          package_extract_file("system.img", "/dev/block/platform/soc/by-name/system");
          ui_print("[3/3] Optimizasyon Yapiliyor...");
          mount("ext4", "EMMC", "/dev/block/platform/soc/by-name/system", "/system");
          run_program("/sbin/sh", "-c", "echo 'ro.config.low_ram=true' >> /system/build.prop");
          unmount("/system");
          ui_print("KURULUM BITTI AGA!");
          EOF

          # Senin kendi binary dosyan
          cp scripts/update-binary output/META-INF/com/google/android/
          chmod 755 output/META-INF/com/google/android/update-binary

      - name: 5. Paketleme
        run: |
          mv *.img output/ 2>/dev/null || true
          mv *.bin output/ 2>/dev/null || true
          cd output
          zip -r9 ../EfeTech_T113_AOSP10_v1.zip .
          cd ..

      - name: 6. Release'e Gönder
        uses: softprops/action-gh-release@v2
        with:
          files: EfeTech_T113_AOSP10_v1.zip
          tag_name: "v1.0.0-Elite"
          name: "Efe Tech Galaxy Crusher V1.0 Elite"
          body: "T113 için tam otomatik, gdown hatası giderilmiş resmi sürüm."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
