name: T113 Android 11 Nitro Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Sunucuyu Hazırla
        uses: actions/checkout@v4

      - name: Hızlandırıcı Temizlik
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf "/usr/local/share/boost"

      - name: Paket Kurulumu
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential zip curl git python3 python-is-python3 libssl-dev libncurses6 libncursesw6 ccache
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          sudo ln -sf ~/bin/repo /usr/bin/repo
          sudo ln -sf /usr/lib/x86_64-linux-gnu/libncurses.so.6 /usr/lib/x86_64-linux-gnu/libncurses.so.5
          sudo ln -sf /usr/lib/x86_64-linux-gnu/libtinfo.so.6 /usr/lib/x86_64-linux-gnu/libtinfo.so.5

      - name: Kaynak Kodları Çek
        run: |
          mkdir build && cd build
          git config --global user.name "Efe"
          git config --global user.email "efe@tech.lab"
          repo init -u https://android.googlesource.com/platform/manifest -b android-11.0.0_r1 --depth=1 --no-clone-bundle
          mkdir -p .repo/local_manifests
          echo '<?xml version="1.0" encoding="UTF-8"?>
          <manifest>
            <remote name="gh" fetch="https://github.com" />
            <project name="AOSPT113/android_device_samsung_goyave" path="device/samsung/goyave" remote="gh" revision="android-11.0" />
            <project name="AOSPT113/android_kernel_samsung_goyave" path="kernel/samsung/goyave" remote="gh" revision="android-11.0" />
            <project name="AOSPT113/android_vendor_samsung_goyave" path="vendor/samsung/goyave" remote="gh" revision="android-11.0" />
            <project name="AOSPT113/android_device_samsung_sc8830-common" path="device/samsung/sc8830-common" remote="gh" revision="android-11.0" />
          </manifest>' > .repo/local_manifests/goyave.xml
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

      - name: Derleme
        run: |
          cd build
          export USE_CCACHE=1
          export CCACHE_EXEC=/usr/bin/ccache
          source build/envsetup.sh
          lunch aosp_goyave-userdebug || echo "Lunch failed"
          make systemimage -j$(nproc --all)

      - name: ZIP Hazırla
        run: |
          if [ -f build/out/target/product/goyave/system.img ]; then
            mkdir -p flashable_zip/META-INF/com/google/android
            cp build/out/target/product/goyave/system.img flashable_zip/
            echo '#!/sbin/sh
            ui_print("T113 V8 Nitro Yuklendi!");
            package_extract_file("system.img", "/dev/block/platform/sdhci-pxa.0/by-name/system");' > flashable_zip/META-INF/com/google/android/update-binary
            cd flashable_zip && zip -r ../T113_V8_Nitro.zip .
          fi

      - name: Yayınla
        uses: softprops/action-gh-release@v2
        with:
          files: T113_V8_Nitro.zip
          tag_name: V8-NITRO
          name: T113 Android 11 Nitro ZIP
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
