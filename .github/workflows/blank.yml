name: T113 Efe Tech - Debug & Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Repoyu Getir
        uses: actions/checkout@v4

      - name: 2. Gerekli Araclar
        run: sudo apt-get update && sudo apt-get install -y zip wget

      - name: 3. Imajları Cek ve Boyutlarını Yazdır
        run: |
          # Drive'dan cekme denemesi
          wget --no-check-certificate 'https://docs.google.com/uc?export=download&id=1VFLsX7Vkm1a0lv1GXKtLMKuyg20ey1XB' -O system.img || true
          wget --no-check-certificate 'https://docs.google.com/uc?export=download&id=1ykNZsdc9DxcFtwz7SLGRSGkAro5Z25Jv' -O boot.img || true
          
          echo "--- INDIRILEN DOSYALARIN GERCEK BOYUTLARI ---"
          ls -lh *.img
          echo "------------------------------------------"

      - name: 4. Paketleme
        run: |
          mkdir -p output/META-INF/com/google/android
          cp $(find . -name "update-binary" | head -n 1) output/META-INF/com/google/android/ || touch output/META-INF/com/google/android/update-binary
          
          cat <<EOF > output/META-INF/com/google/android/updater-script
          ui_print("EFE TECH GALAXY CRUSHER V1");
          package_extract_file("system.img", "/dev/block/platform/soc/by-name/system");
          ui_print("Bitti!");
          EOF
          
          mv *.img output/ 2>/dev/null || true
          cd output && zip -r9 ../EfeTech_T113_Debug.zip . && cd ..

      - name: 5. GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: EfeTech_T113_Debug.zip
          tag_name: "v1.0.0-Debug"
          name: "Efe Tech Debug Build"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
