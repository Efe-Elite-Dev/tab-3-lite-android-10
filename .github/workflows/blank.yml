name: T113 goyawifi Ultimate Recovery Flashable
on:
  workflow_dispatch:

jobs:
  build_rom:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. Sistem Klasörlerini Hazırla
        run: |
          mkdir -p flash_dir/META-INF/com/google/android
          mkdir -p flash_dir/system/bin
          mkdir -p flash_dir/system/lib

      - name: 2. Marvell PXA986 Uyumlu update-binary (HAYATİ)
        run: |
          # TWRP'nin 'Invalid Format' hatası vermemesi için gerçek ARM v7 binary çekiyoruz
          wget -O flash_dir/META-INF/com/google/android/update-binary "https://raw.githubusercontent.com/osm0sis/AnyKernel3/master/META-INF/com/google/android/update-binary"
          chmod 755 flash_dir/META-INF/com/google/android/update-binary

      - name: 3. Marvell goyawifi Özel updater-script
        run: |
          cat << 'EOF' > flash_dir/META-INF/com/google/android/updater-script
          ui_print("---------------------------------------");
          ui_print("   T113 goyawifi - Android 10 ELITE    ");
          ui_print("   Developer: Feyzula Efe Tuna         ");
          ui_print("   Optimization: Marvell/Vivante GC    ");
          ui_print("---------------------------------------");
          
          ui_print("- Partisyonlar Baglaniyor...");
          run_program("/sbin/mount", "/system");
          run_program("/sbin/mount", "/data");
          
          ui_print("- Eski Kalintilar Siliniyor...");
          delete_recursive("/system");
          
          ui_print("- Sistem Dosyalari Aktariliyor...");
          package_extract_dir("system", "/system");
          
          ui_print("- Marvell/Vivante Optimizasyonu Yapiliyor...");
          # İzinleri Marvell PXA986 mimarisine göre ayarla
          set_metadata_recursive("/system", "uid", 0, "gid", 0, "dmode", 0755, "fmode", 0644);
          set_metadata_recursive("/system/bin", "uid", 0, "gid", 2000, "dmode", 0755, "fmode", 0755);
          
          ui_print("- Kurulum Basarili! Yeniden Baslatiliyor...");
          unmount("/system");
          unmount("/data");
          ui_print("---------------------------------------");
          EOF

      - name: 4. goyawifi build.prop (Maksimum RAM & GPU)
        run: |
          cat << 'EOF' > flash_dir/system/build.prop
          # Samsung Galaxy Tab 3 Lite 7.0 Optimizasyonu
          ro.product.model=SM-T113
          ro.product.device=goyawifi
          ro.build.product=goyawifi
          # Low RAM (1GB RAM Destegi)
          ro.config.low_ram=true
          dalvik.vm.heapsize=128m
          dalvik.vm.heapgrowthlimit=48m
          # Vivante GC1000 GPU Fix
          debug.hwui.renderer=opengl
          ro.hwui.disable_scissoring=true
          persist.sys.use_dithering=0
          EOF

      - name: 5. KUSURSUZ ZIPLEME (Invalid Format Fix)
        run: |
          cd flash_dir
          # Klasörü değil, İÇERİĞİ zipliyoruz! Bu TWRP format hatasını %100 çözer.
          zip -r9 ../T113-Android10-Elite.zip ./*

      - name: 6. ROM'u Artifact Olarak Yükle
        uses: actions/upload-artifact@v4
        with:
          name: goyawifi-Elite-ROM
          path: T113-Android10-Elite.zip
