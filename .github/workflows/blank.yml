name: T113 Efe Tech Galaxy Crusher Final Deployment

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 1. Repoyu Getir
        uses: actions/checkout@v4

      - name: 2. Gerekli Aracları Kur
        run: sudo apt-get update && sudo apt-get install -y zip curl wget

      - name: 3. Imajları Drive'dan Cek (ULTRA-FORCED)
        run: |
          set -e
          download_drive_file() {
            FILE_ID=$1
            OUT_NAME=$2
            echo "${OUT_NAME} indiriliyor (ID: ${FILE_ID})..."
            
            # Buyuk dosya onayini ve cerezleri alarak indir
            CONFIRM=$(wget --quiet --save-cookies /tmp/cookies.txt --keep-session-cookies --no-check-certificate "https://docs.google.com/uc?export=download&id=${FILE_ID}" -O- | sed -rn 's/.*confirm=([0-9A-Za-z_]+).*/\1\n/p')
            
            if [ -n "$CONFIRM" ]; then
              wget --load-cookies /tmp/cookies.txt "https://docs.google.com/uc?export=download&confirm=${CONFIRM}&id=${FILE_ID}" -O "${OUT_NAME}"
            else
              wget --no-check-certificate "https://docs.google.com/uc?export=download&id=${FILE_ID}" -O "${OUT_NAME}"
            fi
            rm -rf /tmp/cookies.txt
          }

          # YENI SISTEM LINKINI BURAYA EKLEDIK
          download_drive_file "1VFLsX7Vkm1a0lv1GXKtLMKuyg20ey1XB" "system.img"
          
          # Diger dosyalara devam
          download_drive_file "1ykNZsdc9DxcFtwz7SLGRSGkAro5Z25Jv" "boot.img"
          download_drive_file "1VQkPk84l9n3Uc04aYp3I_eoJIePj06E3" "sprdcp.img"
          download_drive_file "1wRd-CixOdcYhppNAksnRoNlcyoacFNLk" "sboot2.bin"
          download_drive_file "1tvkKWkinJUKKLXDwW0x2YRq5GXriqX3y" "sboot.bin"
          download_drive_file "1lWWUXpxXMihPgMbgg12wH93kXsjD-6BP" "spl.img"
          
          # Boyut kontrolü
          ls -lh *.img *.bin
          if [ $(stat -c%s system.img) -lt 10000000 ]; then
             echo "HATA: system.img hala cok kucuk! Link iznini 'Anyone with the link' yaptigindan emin ol."
             exit 1
          fi

      - name: 4. Updater-Script ve Binary
        run: |
          mkdir -p output/META-INF/com/google/android
          cat <<EOF > output/META-INF/com/google/android/updater-script
          ui_print("======================================");
          ui_print("     EFE TECH GALAXY CRUSHER V1      ");
          ui_print("   BUILD: \$(date +'%d/%m/%Y')          ");
          ui_print("======================================");
          ui_print("Sistem Yukleniyor...");
          package_extract_file("boot.img", "/dev/block/platform/soc/by-name/boot");
          package_extract_file("system.img", "/dev/block/platform/soc/by-name/system");
          ui_print("Efe Tech Elite Ayarlar Yapiliyor...");
          mount("ext4", "EMMC", "/dev/block/platform/soc/by-name/system", "/system");
          run_program("/sbin/sh", "-c", "echo 'ro.config.low_ram=true' >> /system/build.prop");
          unmount("/system");
          ui_print("TAMAMLANDI!");
          EOF
          
          cp scripts/update-binary output/META-INF/com/google/android/
          chmod 755 output/META-INF/com/google/android/update-binary

      - name: 5. Paketle ve Release
        run: |
          mv *.img output/ 2>/dev/null || true
          mv *.bin output/ 2>/dev/null || true
          cd output
          zip -r9 ../EfeTech_T113_Final.zip .
          cd ..

      - name: 6. GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: EfeTech_T113_Final.zip
          tag_name: "v1.0.0-Elite"
          name: "Efe Tech Galaxy Crusher Elite"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
