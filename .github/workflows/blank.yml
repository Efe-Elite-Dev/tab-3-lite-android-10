name: T113 C-Drive Test Build

on:
  workflow_dispatch:

jobs:
  check_files:
    runs-on: ubuntu-latest
    steps:
      - name: Yerel Dosyaya Erişmeyi Dene
        run: |
          echo "Senin C diskindeki dosyaya ulasmaya calisiyorum..."
          # Linux sunucusu senin Windows bilgisayarindaki bu yolu arayacak:
          ls "file:///C:/Users/User/Downloads/SAMFW.COM_SM-T113_TUR_T113XXS0AQC2_fac/system.img" || echo "HATA: Sunucu senin bilgisayarina baglanamiyor!"
          
      - name: Neden Olmadigini Acikla
        run: |
          echo "GitHub sunuculari su an Amerika/Avrupa veri merkezlerinde calisiyor."
          echo "Senin bilgisayarin ise Turkiye'de ve yerel agda."
          echo "Bir web linki (http) olmadigi surece sunucu senin dosyalarini goremez."
