name: T113 V8 Nitro Lite Fix

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📂 Repoyu Hazirla
        uses: actions/checkout@v4

      - name: 🛠️ Efe Lab Araclari Kur
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential zip curl abootimg python3-pip android-sdk-libsparse-utils
          pip install gdown

      - name: 🏎️ Drive'dan Dosyalari Cek
        run: |
          gdown --id "1OkFvGvI5TSQtK22Ib73xZNI1g1muBvGE" -O system.img
          gdown --id "1OkFvGvI5TSQtK22Ib73xZNI1g1muBvGE" -O boot.img || echo "Boot yok"

      - name: 🪄 Efe Lab: Sparse Mode
        run: |
          mv system.img system.raw.img
          img2simg system.raw.img system.img
          rm -f system.raw.img

      - name: 🏗️ TWRP Paketleme
        run: |
          mkdir -p flashable/META-INF/com/google/android
          mkdir -p flashable/images
          cp system.img flashable/images/system.img
          cp boot.img flashable/images/boot.img
          
          # UPDATE-BINARY
          printf '#!/sbin/sh\n' > flashable/META-INF/com/google/android/update-binary
          
          # UPDATER-SCRIPT (Hatasız Yazım Yöntemi)
          printf 'ui_print("--------------------------------------");\n' > flashable/META-INF/com/google/android/updater-script
          printf 'ui_print("   T113 V8 NITRO - LITE EDITION       ");\n' >> flashable/META-INF/com/google/android/updater-script
          printf 'ui_print("        EFE TECH LAB                  ");\n' >> flashable/META-INF/com/google/android/updater-script
          printf 'ui_print("--------------------------------------");\n' >> flashable/META-INF/com/google/android/updater-script
          printf 'package_extract_file("images/system.img", "/dev/block/platform/sprd-sdhci.3/by-name/system");\n' >> flashable/META-INF/com/google/android/updater-script
          printf 'package_extract_file("images/boot.img", "/dev/block/platform/sprd-sdhci.3/by-name/boot");\n' >> flashable/META-INF/com/google/android/updater-script
          printf 'ui_print("ISLEM TAMAM! EFE LAB SUNAR.");\n' >> flashable/META-INF/com/google/android/updater-script

      - name: 🎁 ZIP Olustur
        run: |
          cd flashable && zip -9 -r ../T113_V8_Lite_Edition.zip .

      - name: 🚀 Efe Lab: Release Olustur
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v8.2-lite-final-fix"
          name: "T113 V8 Nitro Lite Edition Final Fix"
          body: "Line 26 hatasi giderildi. Efe Lab Lite Edition hazir!"
          files: T113_V8_Lite_Edition.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
