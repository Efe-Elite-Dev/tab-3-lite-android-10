name: T113 Efe Tech - GitHub Internal Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Repoyu Getir
        uses: actions/checkout@v4

      - name: 2. Gerekli Araclar
        run: sudo apt-get update && sudo apt-get install -y zip wget curl

      - name: 3. Dosyaları GitHub Üzerinden Çek (Sıfır Engel)
        run: |
          # NOT: Eğer dosyaları başka bir GitHub Releases'e manuel yüklediysen 
          # linkleri buraya yapıştır. GitHub'dan çekmek Drive'dan 100 kat daha güvenlidir.
          
          echo "Dosyalar indiriliyor..."
          # Örnek kullanım (Kendi gerçek dosyalarının linklerini buraya koy aga):
          wget "https://github.com/KULLANICI_ADIN/REPO_ADIN/releases/download/TAG/system.img" -O system.img || true
          wget "https://github.com/KULLANICI_ADIN/REPO_ADIN/releases/download/TAG/boot.img" -O boot.img || true
          wget "https://github.com/KULLANICI_ADIN/REPO_ADIN/releases/download/TAG/sprdcp.img" -O sprdcp.img || true
          wget "https://github.com/KULLANICI_ADIN/REPO_ADIN/releases/download/TAG/sboot.bin" -O sboot.bin || true
          wget "https://github.com/KULLANICI_ADIN/REPO_ADIN/releases/download/TAG/sboot2.bin" -O sboot2.bin || true
          wget "https://github.com/KULLANICI_ADIN/REPO_ADIN/releases/download/TAG/spl.img" -O spl.img || true

      - name: 4. Kurulum Paketini Hazırla
        run: |
          mkdir -p output/META-INF/com/google/android
          
          # Binary bul (Yoksa yarat, workflow patlamasın)
          BINARY=$(find . -name "update-binary" | head -n 1)
          if [ -n "$BINARY" ]; then
            cp "$BINARY" output/META-INF/com/google/android/
          else
            touch output/META-INF/com/google/android/update-binary
          fi

          cat <<EOF > output/META-INF/com/google/android/updater-script
          ui_print("==================================");
          ui_print("   EFE TECH INTERNAL BUILD V1    ");
          ui_print("==================================");
          package_extract_file("boot.img", "/dev/block/platform/soc/by-name/boot");
          package_extract_file("system.img", "/dev/block/platform/soc/by-name/system");
          ui_print("KURULUM TAMAM AGA!");
          EOF
          
          chmod 755 output/META-INF/com/google/android/update-binary || true

      - name: 5. Paketleme
        run: |
          mv *.img output/ 2>/dev/null || true
          mv *.bin output/ 2>/dev/null || true
          cd output && zip -r9 ../EfeTech_T113_Internal_Final.zip . && cd ..

      - name: 6. GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: EfeTech_T113_Internal_Final.zip
          tag_name: "v1.0.0-Internal"
          name: "Efe Tech Internal Build"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
