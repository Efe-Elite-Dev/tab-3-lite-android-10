name: T113 Custom ROM Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip zip wget img2simg
          pip install gdown

      - name: Download Custom Image
        run: |
          gdown --id 1dF1k6XNHfycHEbVQMWCaTvBBNki7-SOL -O custom_system.img

      - name: Inject Custom Build Prop
        run: |
          # Build prop içeriğini bir dosyaya yazalım
          cat <<EOF > my_build.prop
          $(cat <<'PROPS'
          # Efe Tech Custom Build Props
          ro.build.id=OPM7.181205.001
          ro.build.display.id=e_goyavewifi-EfeTech-v1
          ro.product.model=SM-T113NU
          ro.sf.hwrotation=270
          ro.config.zram.support=true
          ro.config.swappiness=130
          dalvik.vm.heapsize=128m
          # ... (Diğer tüm satırları buraya ekleyebilirsin)
          PROPS
          )
          EOF
          # Not: Burada imajı mount edip dosyayı değiştirmek için loop mount yetkisi gerekir.
          # GitHub runner'da 'sudo mount' kullanarak system.img içindeki build.prop'u güncelleyeceğiz.

      - name: Create Flashable Zip
        run: |
          mkdir output
          mv custom_system.img output/system.img
          # Meta-inf ve diğer dosyaları ekleme adımı buraya gelecek
          zip -r EfeTech_Custom_ROM.zip output/

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: EfeTech_Custom_ROM.zip
          tag_name: v1.1.0-Custom
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
