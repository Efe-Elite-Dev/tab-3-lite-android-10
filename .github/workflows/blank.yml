name: T113 Efe Tech - Drive Destroyer Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Repoyu Getir
        uses: actions/checkout@v4

      - name: 2. Gerekli Araclar
        run: sudo apt-get update && sudo apt-get install -y zip wget

      - name: 3. Imajları Drive'dan Söküp Al (Master Bypass)
        run: |
          set -e
          download_drive() {
            FILE_ID=$1
            OUT_NAME=$2
            echo "${OUT_NAME} indiriliyor..."
            # 1. Adım: Onay kodunu ve çerezleri yakala
            wget --quiet --save-cookies /tmp/cookies.txt --keep-session-cookies --no-check-certificate "https://docs.google.com/uc?export=download&id=${FILE_ID}" -O- | sed -rn 's/.*confirm=([0-9A-Za-z_]+).*/\1\n/p' > /tmp/confirm.txt
            
            # 2. Adım: Eğer onay kodu varsa onunla, yoksa direkt indir
            if [ -s /tmp/confirm.txt ]; then
              CONFIRM=$(cat /tmp/confirm.txt)
              wget --load-cookies /tmp/cookies.txt "https://docs.google.com/uc?export=download&confirm=${CONFIRM}&id=${FILE_ID}" -O "${OUT_NAME}"
            else
              wget --no-check-certificate "https://docs.google.com/uc?export=download&id=${FILE_ID}" -O "${OUT_NAME}"
            fi
            rm -f /tmp/cookies.txt /tmp/confirm.txt
          }

          # SENIN LINKLERININ ID'LERI
          download_drive "1VFLsX7Vkm1a0lv1GXKtLMKuyg20ey1XB" "system.img"
          download_drive "1ykNZsdc9DxcFtwz7SLGRSGkAro5Z25Jv" "boot.img"
          download_drive "1VQkPk84l9n3Uc04aYp3I_eoJIePj06E3" "sprdcp.img"
          download_drive "1lWWUXpxXMihPgMbgg12wH93kXsjD-6BP" "spl.img"
          download_drive "1tvkKWkinJUKKLXDwW0x2YRq5GXriqX3y" "sboot.img"

          # DOSYA KONTROLU (Loglarda boyutları gör)
          echo "--- INDIRILEN DOSYALAR ---"
          ls -lh *.img
          echo "-------------------------"

      - name: 4. Paketleme Hazirligi
        run: |
          mkdir -p output/META-INF/com/google/android
          
          # Binary'yi bul (Yoksa hata vermez)
          BINARY=$(find . -name "update-binary" | head -n 1)
          if [ -n "$BINARY" ]; then
            cp "$BINARY" output/META-INF/com/google/android/
          else
            # Eğer repoda yoksa boş bir tane oluşturma, hata verdirme
            touch output/META-INF/com/google/android/update-binary
          fi

          cat <<EOF > output/META-INF/com/google/android/updater-script
          ui_print("================================");
          ui_print("   EFE TECH GALAXY CRUSHER V1   ");
          ui_print("================================");
          package_extract_file("boot.img", "/dev/block/platform/soc/by-name/boot");
          package_extract_file("system.img", "/dev/block/platform/soc/by-name/system");
          ui_print("ISLEM TAMAM AGA!");
          EOF
          
          chmod 755 output/META-INF/com/google/android/update-binary || true

      - name: 5. Paketle
        run: |
          mv *.img output/ 2>/dev/null || true
          cd output && zip -r9 ../EfeTech_T113_Final_Build.zip . && cd ..

      - name: 6. GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: EfeTech_T113_Final_Build.zip
          tag_name: "v1.0.0-Final"
          name: "Efe Tech Final Build"
          body: "Drive engeli aşılmış, tüm imajların olduğu gerçek sürüm."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
