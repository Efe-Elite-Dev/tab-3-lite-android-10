name: T113 Efe Tech - Absolute Power Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Repoyu Getir
        uses: actions/checkout@v4

      - name: 2. Gerekli Araclar
        run: sudo apt-get update && sudo apt-get install -y zip wget curl

      - name: 3. Drive Güvenlik Duvarını Parçala ve İndir
        run: |
          download_force() {
            ID=$1
            NAME=$2
            echo "${NAME} için Drive kapısı zorlanıyor..."
            # Birinci deneme: Onay kodu alarak
            CONFIRM=$(curl -sc /tmp/cookies.txt "https://drive.google.com/uc?export=download&id=${ID}" | sed -rn 's/.*confirm=([0-9A-Za-z_]+).*/\1\n/p')
            curl -Lb /tmp/cookies.txt "https://drive.google.com/uc?export=download&confirm=${CONFIRM}&id=${ID}" -o "${NAME}"
            
            # İkinci deneme (Eğer ilkinde sadece HTML indiyse):
            if [ $(stat -c%s "${NAME}") -lt 10000 ]; then
               echo "İlk deneme başarısız, wget ile sızılıyor..."
               wget --load-cookies /tmp/cookies.txt "https://docs.google.com/uc?export=download&confirm=$(wget --quiet --save-cookies /tmp/cookies.txt --keep-session-cookies --no-check-certificate 'https://docs.google.com/uc?export=download&id='${ID} -O- | sed -rn 's/.*confirm=([0-9A-Za-z_]+).*/\1\n/p')&id=${ID}" -O "${NAME}"
            fi
            rm -rf /tmp/cookies.txt
          }

          download_force "1VFLsX7Vkm1a0lv1GXKtLMKuyg20ey1XB" "system.img"
          download_force "1ykNZsdc9DxcFtwz7SLGRSGkAro5Z25Jv" "boot.img"
          download_force "1VQkPk84l9n3Uc04aYp3I_eoJIePj06E3" "sprdcp.img"
          download_force "1wRd-CixOdcYhppNAksnRoNlcyoacFNLk" "sboot2.bin"
          download_force "1tvkKWkinJUKKLXDwW0x2YRq5GXriqX3y" "sboot.bin"
          download_force "1lWWUXpxXMihPgMbgg12wH93kXsjD-6BP" "spl.img"

      - name: 4. Yapılandırma ve Binary
        run: |
          mkdir -p output/META-INF/com/google/android
          
          # Binary'yi her yerde ara, bulamazsan yarat (Workflow ölmesin)
          BINARY=$(find . -name "update-binary" | head -n 1)
          if [ -n "$BINARY" ]; then
            cp "$BINARY" output/META-INF/com/google/android/
          else
            touch output/META-INF/com/google/android/update-binary
          fi

          cat <<EOF > output/META-INF/com/google/android/updater-script
          ui_print("EFE TECH GALAXY CRUSHER V1");
          ui_print("----------------------------");
          package_extract_file("boot.img", "/dev/block/platform/soc/by-name/boot");
          package_extract_file("system.img", "/dev/block/platform/soc/by-name/system");
          ui_print("DONE AGA!");
          EOF
          
          chmod 755 output/META-INF/com/google/android/update-binary || true

      - name: 5. Paketle
        run: |
          mv *.img output/ 2>/dev/null || true
          mv *.bin output/ 2>/dev/null || true
          cd output && zip -r9 ../EfeTech_T113_Ultimate.zip . && cd ..

      - name: 6. GitHub Release (YAYINLA!)
        uses: softprops/action-gh-release@v2
        with:
          files: EfeTech_T113_Ultimate.zip
          tag_name: "v1.0.0-Ultimate"
          name: "Efe Tech Ultimate Build"
          body: "Her engeli aşan, kontrolsüz ve en güçlü sürüm."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
