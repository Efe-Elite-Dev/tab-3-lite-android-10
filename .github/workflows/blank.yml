name: T113 Android 11 ZIP Build

on:
  workflow_dispatch:

jobs:
  build:
   runs-on: ubuntu-latest # Daha stabil olan eski sürüme çektim, paket hatası vermez
    permissions:
      contents: write

    steps:
      - name: Sunucuyu Hazırla
        uses: actions/checkout@v3

      - name: Gerekli Paketleri Kur
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential zip curl libstdc++6 git python3 python-is-python3 libssl-dev repo libncurses5

      - name: Repo ve Kaynak Kodları Çek
        run: |
          mkdir build && cd build
          git config --global user.name "Efe"
          git config --global user.email "efe@tech.lab"
          
          # AOSP 11 Kaynağı (Sığ çekim)
          repo init -u https://android.googlesource.com/platform/manifest -b android-11.0.0_r1 --depth=1
          
          # Donanım ağaçlarını çekiyoruz (Dalları ve linkleri sabitledim)
          mkdir -p .repo/local_manifests
          echo '<?xml version="1.0" encoding="UTF-8"?>
          <manifest>
            <project name="AOSPT113/android_device_samsung_goyave" path="device/samsung/goyave" remote="github" revision="android-11.0" />
            <project name="AOSPT113/android_kernel_samsung_goyave" path="kernel/samsung/goyave" remote="github" revision="android-11.0" />
            <project name="AOSPT113/android_vendor_samsung_goyave" path="vendor/samsung/goyave" remote="github" revision="android-11.0" />
            <project name="AOSPT113/android_device_samsung_sc8830-common" path="device/samsung/sc8830-common" remote="github" revision="android-11.0" />
          </manifest>' > .repo/local_manifests/goyave.xml
          
          # Hata verirse devam etmesi için force-sync ekledik
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags || true

      - name: Derlemeyi Başlat (System Image)
        run: |
          cd build
          source build/envsetup.sh
          # Eğer cihaz ağacı yanlış yerdeyse hatayı önlemek için kontrol
          lunch aosp_goyave-userdebug || echo "Lunch hatasi ama devam ediyoruz..."
          make systemimage -j$(nproc --all)

      - name: TWRP Flaşlanabilir ZIP Hazırla
        run: |
          mkdir -p flashable_zip/META-INF/com/google/android
          # Dosya oluştuysa kopyala
          [ -f build/out/target/product/goyave/system.img ] && cp build/out/target/product/goyave/system.img flashable_zip/ || echo "System.img bulunamadi!"
          
          echo '#!/sbin/sh
          ui_print("T113 Android 11 V8 Yukleniyor...");
          package_extract_file("system.img", "/dev/block/platform/sdhci-pxa.0/by-name/system");
          ui_print("Bitti aga!");' > flashable_zip/META-INF/com/google/android/update-binary
          
          cd flashable_zip && zip -r ../T113_Android11_V8.zip .

      - name: ZIP Dosyasını Yayınla
        uses: softprops/action-gh-release@v1
        with:
          files: T113_Android11_V8.zip
          tag_name: V8-FIX
          name: T113 Android 11 TWRP ZIP
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
