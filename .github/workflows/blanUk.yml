name: T113 Android 10 Porting (Magic Fix)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y zip wget android-sdk-libsparse-utils brotli e2tools p7zip-full
          pip install gdown
          git clone https://github.com/xpirt/img2sdat.git img2sdat_tool

      - name: Download Images
        run: |
          gdown --id 1VFLsX7Vkm1a0lv1GXKtLMKuyg20ey1XB -O stock_system.img --fuzzy
          gdown --id 1ykNZsdc9DxcFtwz7SLGRSGkAro5Z25Jv -O boot.img --fuzzy
          gdown --id 1dF1k6XNHfycHEbVQMWCaTvBBNki7-SOL -O port_source.img --fuzzy
          # Dosya kontrolü (0 byte ise hata ver)
          ls -lh *.img

      - name: Porting & Build Prop
        run: |
          # Önce build.prop hazırlayalım
          cat <<EOF > build.prop
          ro.build.id=QP1A.190711.020
          ro.build.display.id=EfeTech_T113_AOSP10_v3.3
          ro.build.version.release=10
          ro.build.version.sdk=29
          ro.product.model=SM-T113NU
          ro.product.device=goyavewifi
          ro.sf.hwrotation=270
          ro.sf.lcd_density=160
          ro.config.low_ram=true
          ro.config.swappiness=180
          debug.hwui.renderer=opengl
          persist.sys.usb.config=mtp,adb
          EOF

          # EĞER port_source.img Sparse ise RAW'a çevirip build.prop gömmemiz lazım
          # Sonra img2sdat için tekrar Sparse yapmamız gerekebilir.
          # Şimdilik en güvenli yol: RAW üzerinde çalışıp img2sdat'a RAW vermek (Script destekliyorsa)
          simg2img port_source.img port_working.img || cp port_source.img port_working.img
          
          e2cp build.prop port_working.img:/build.prop
          e2cp build.prop port_working.img:/system/build.prop || true
          
          # img2sdat Sparse Magic beklediği için tekrar çeviriyoruz
          img2simg port_working.img system.img

      - name: Convert to .dat.br (Sparse Input)
        run: |
          # Artık system.img bir Sparse Image (Magic: 0xED26FF3A)
          python3 img2sdat_tool/img2sdat.py system.img -o . -v 4 -p system
          brotli -q 6 system.new.dat -o system.new.dat.br

      - name: Create TWRP Zip
        run: |
          mkdir -p output/META-INF/com/google/android
          if [ -d "META-INF" ]; then cp -r META-INF/* output/META-INF/; fi
          
          mv system.new.dat.br output/
          mv system.transfer.list output/
          touch output/system.patch.dat
          mv boot.img output/
          
          cd output && zip -r ../T113_AOSP10_Final_Port.zip .

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: T113_AOSP10_Final_Port.zip
          tag_name: v3.3-Magic
          name: "SM-T113 AOSP 10 Port v3.3"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
