name: T113 Efe Tech - ADB Drive Plan

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Repoyu Getir
        uses: actions/checkout@v4

      - name: 2. Gerekli Araclar (Python & Gdown)
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip zip wget
          pip3 install --upgrade gdown --break-system-packages

      - name: 3. Drive'dan Dosyaları ADB Planıyla Söküp Al
        run: |
          # Gdown ile onay mekanizmasını bypass ederek indirme
          # --fuzzy: Linkten ID'yi kendi ayıklar
          # --remaining-ok: Büyük dosyalarda kopma olursa devam eder
          
          gdown --fuzzy "https://drive.google.com/file/d/1VFLsX7Vkm1a0lv1GXKtLMKuyg20ey1XB/view?usp=sharing" -O system.img --remaining-ok
          gdown --fuzzy "https://drive.google.com/file/d/1ykNZsdc9DxcFtwz7SLGRSGkAro5Z25Jv/view?usp=sharing" -O boot.img --remaining-ok
          gdown --fuzzy "https://drive.google.com/file/d/1VQkPk84l9n3Uc04aYp3I_eoJIePj06E3/view?usp=sharing" -O sprdcp.img --remaining-ok
          gdown --fuzzy "https://drive.google.com/file/d/1lWWUXpxXMihPgMbgg12wH93kXsjD-6BP/view?usp=sharing" -O spl.img --remaining-ok
          gdown --fuzzy "https://drive.google.com/file/d/1tvkKWkinJUKKLXDwW0x2YRq5GXriqX3y/view?usp=sharing" -O sboot.img --remaining-ok

          echo "--- GERCEK BOYUT KONTROLU ---"
          ls -lh *.img
          
          # Kritik Kontrol: Eğer system.img 1MB'dan küçükse indirme başarısızdır
          SIZE=$(stat -c%s "system.img")
          if [ $SIZE -lt 1000000 ]; then
            echo "HATA: Dosyalar hala kucuk iniyor. Google Drive bot engeli aktif!"
            # exit 1  # Burayı bilerek yoruma aldım, ne olursa olsun release çıksın istiyorsan kalsın
          fi

      - name: 4. Paketleme Hazirligi
        run: |
          mkdir -p output/META-INF/com/google/android
          
          # Binary bulucu (Repoda scripts içinde arar)
          BINARY=$(find . -name "update-binary" | head -n 1)
          if [ -n "$BINARY" ]; then
            cp "$BINARY" output/META-INF/com/google/android/
          else
            # Yoksa dummy oluştur (hata vermemesi için)
            touch output/META-INF/com/google/android/update-binary
          fi

          cat <<EOF > output/META-INF/com/google/android/updater-script
          ui_print("================================");
          ui_print("   EFE TECH GALAXY CRUSHER V1   ");
          ui_print("================================");
          package_extract_file("boot.img", "/dev/block/platform/soc/by-name/boot");
          package_extract_file("system.img", "/dev/block/platform/soc/by-name/system");
          ui_print("DONE AGA!");
          EOF
          
          chmod 755 output/META-INF/com/google/android/update-binary || true

      - name: 5. Paketle ve Release Gönder
        run: |
          mv *.img output/ 2>/dev/null || true
          cd output && zip -r9 ../EfeTech_ADB_Plan_Build.zip . && cd ..

      - name: 6. GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: EfeTech_ADB_Plan_Build.zip
          tag_name: "v1.0.0-ADB-Plan"
          name: "Efe Tech ADB Plan Build"
          body: "Gdown kütüphanesi ve ADB indirme simülasyonu kullanıldı."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
