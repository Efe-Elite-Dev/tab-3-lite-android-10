name: T113 V13 Nitro Final Fix

on:
  workflow_dispatch:

jobs:
  efe-lab-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Repoyu Hazirla
        uses: actions/checkout@v4

      - name: Python 3.10 Kur (Compatibility Mode)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Sistem Guncelle ve Araclari Kur
        run: |
          sudo apt-get update
          sudo apt-get install -y brotli zip android-sdk-libsparse-utils curl git
          pip install gdown
          git clone https://github.com/xpirt/img2sdat.git

      - name: Google Drive Muhimmatlarini Cek
        run: |
          gdown --id "1OkFvGvI5TSQtK22Ib73xZNI1g1muBvGE" -O system.img
          gdown --id "1OkFvGvI5TSQtK22Ib73xZNI1g1muBvGE" -O boot.img || echo "Boot yok"

      - name: Imaj Dogrulama ve Raw Donusumu
        run: |
          # Sparse imaji Raw'a ceviriyoruz
          simg2img system.img system.raw.img 2>/dev/null || mv system.img system.raw.img
          [ -f system.raw.img ] && mv system.raw.img system.img
          echo "Imaj hazir."

      - name: Efe Lab: Block-Based OTA Donusumu
        run: |
          python3 img2sdat/img2sdat.py system.img -o output -v 4
          echo "Brotli sikistirma basliyor (Level 9)..."
          brotli -9 output/system.new.dat -o output/system.new.dat.br
          rm output/system.new.dat
          touch output/system.patch.dat

      - name: Klasor Yapisini Insa Et
        run: |
          mkdir -p out/install/bin
          mkdir -p out/META-INF/com/google/android
          mkdir -p out/system
          mv output/system.new.dat.br out/
          mv output/system.transfer.list out/
          mv output/system.patch.dat out/
          mv boot.img out/
          touch out/file_contexts.bin
          echo "# Efe Lab build.prop" > out/system/build.prop
          printf '#!/sbin/sh\necho "Backup Tool"\n' > out/install/bin/backuptool.sh
          printf '#!/sbin/sh\necho "Functions"\n' > out/install/bin/backuptool.functions
          chmod +x out/install/bin/*.sh

      - name: Updater Script Yazimi (Line 40 Fix)
        run: |
          # Hatalı olan >> >> kısmı cat ile tek seferde güvenli hale getirildi
          cat << 'EOF' > out/META-INF/com/google/android/updater-script
          ui_print("--------------------------------------");
          ui_print("   T113 V13 NITRO - FINAL EDITION     ");
          ui_print("        EFE TECH LAB PRO              ");
          ui_print("--------------------------------------");
          ui_print("Sistem bloklari yaziliyor...");
          block_image_update("/dev/block/platform/sprd-sdhci.3/by-name/system", package_extract_file("system.transfer.list"), "system.new.dat.br", "system.patch.dat");
          ui_print("Boot yaziliyor...");
          package_extract_file("boot.img", "/dev/block/platform/sprd-sdhci.3/by-name/boot");
          ui_print("KURULUM TAMAMLANDI! EFE LAB SUNAR.");
          EOF

      - name: Update-Binary Hazirla
        run: |
          printf '#!/sbin/sh\n/sbin/edify -s "$1" "$2" "$3"\n' > out/META-INF/com/google/android/update-binary
          chmod +x out/META-INF/com/google/android/update-binary

      - name: ZIP Paketleme
        run: |
          cd out && zip -9 -r ../T113_V13_Final_Success.zip .

      - name: Efe Lab Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v13.0-final"
          name: "T113 V13 Nitro (Syntax Fix)"
          body: "Line 40 syntax hatasi giderildi. Tiyaptip benzer official block yapisi hazir."
          files: T113_V13_Final_Success.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
