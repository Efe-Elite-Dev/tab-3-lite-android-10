name: T113 Android 10 Hybrid Custom Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Essential Tools
        run: |
          sudo apt-get update
          # Yeni Ubuntu sürümleri için doğru paket ismi
          sudo apt-get install -y python3-pip zip wget android-sdk-libsparse-utils e2tools
          pip install gdown

      - name: Download Components
        run: |
          # 1. Kaynak: Stock Boot'un olduğu paket
          gdown --id 1VFLsX7Vkm1a0lv1GXKtLMKuyg20ey1XB -O stock_pack.zip
          unzip stock_pack.zip "boot.img" || unzip stock_pack.zip
          
          # 2. Kaynak: Senin Custom System Imajın (Android 10)
          gdown --id 1dF1k6XNHfycHEbVQMWCaTvBBNki7-SOL -O custom_system.img

      - name: Create & Inject Optimized Build Prop
        run: |
          cat <<EOF > build.prop
          # --- EFE TECH T113 ANDROID 10 HYBRID OPTIMIZATION ---
          ro.build.id=QP1A.190711.020
          ro.build.display.id=EfeTech_T113_A10_Custom_v1.2
          ro.build.version.release=10
          ro.build.version.sdk=29
          ro.product.model=SM-T113NU
          ro.product.brand=samsung
          ro.product.device=goyavewifi
          # --- ULTRA PERFORMANCE TWEAKS ---
          ro.config.low_ram=true
          ro.config.swappiness=150
          ro.config.zram.support=true
          ro.config.zram.disksize=512M
          ro.sf.hwrotation=270
          ro.sf.lcd_density=160
          debug.hwui.renderer=opengl
          dalvik.vm.heapsize=128m
          persist.sys.usb.config=mtp,adb
          ro.lineage.version=17.1-EfeTech-A10
          EOF
          
          # Imajı RAW formatına çevir ve modla
          simg2img custom_system.img system_raw.img || mv custom_system.img system_raw.img
          e2cp build.prop system_raw.img:/build.prop
          e2cp build.prop system_raw.img:/system/build.prop || true
          e2cp build.prop system_raw.img:/system/etc/build.prop || true
          
          # Tekrar paketle
          img2simg system_raw.img system.img

      - name: Prepare Final Flashable Package
        run: |
          mkdir output
          # Stock'tan gelen boot ve bizim modladığımız system
          mv system.img output/
          mv boot.img output/ || echo "Boot.img bulunamadı, kontrol et!"
          
          # Eğer repo'nda META-INF klasörü varsa ekle
          if [ -d "META-INF" ]; then cp -r META-INF output/; fi
          
          cd output && zip -r ../EfeTech_T113_A10_Hybrid.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: EfeTech_T113_A10_Hybrid.zip
          tag_name: v1.5.0-A10-Hybrid
          name: "T113 Android 10 Hybrid (Stock Boot + Custom System)"
          body: "Efe Tech: Stock Boot.img ve Android 10 Custom System.img birleştirildi. Full optimize edildi."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
