name: T113 Android 10 Hybrid Ultra Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Essential Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip zip wget android-sdk-libsparse-utils e2tools
          pip install gdown --break-system-packages

      - name: Download Components (Direct IMG)
        run: |
          # 1. Boot Image (Daha önce çalışan ID)
          gdown --id 1ykNZsdc9DxcFtwz7SLGRSGkAro5Z25Jv -O boot.img --fuzzy
          
          # 2. Custom System Image (Senin Android 10 dosyan)
          gdown --id 1dF1k6XNHfycHEbVQMWCaTvBBNki7-SOL -O system_source.img --fuzzy
          
          # Kontrol
          ls -lh boot.img system_source.img

      - name: Create T113 Optimized Build Prop
        run: |
          cat <<EOF > build.prop
          # --- EFE TECH T113 ANDROID 10 FULL OPTIMIZE ---
          ro.build.id=QP1A.190711.020
          ro.build.display.id=EfeTech_T113_A10_v1.7_Final
          ro.build.version.release=10
          ro.build.version.sdk=29
          ro.product.model=SM-T113NU
          ro.product.brand=samsung
          ro.product.device=goyavewifi
          ro.sf.hwrotation=270
          ro.sf.lcd_density=160
          ro.config.low_ram=true
          ro.config.swappiness=180
          ro.config.zram.support=true
          ro.config.zram.disksize=512M
          debug.hwui.renderer=opengl
          dalvik.vm.heapgrowthlimit=64m
          dalvik.vm.heapsize=128m
          persist.sys.usb.config=mtp,adb
          EOF

      - name: Inject & Repack Image
        run: |
          # Sparse ise RAW'a çevir, değilse devam et
          simg2img system_source.img system_raw.img || mv system_source.img system_raw.img
          
          # build.prop dosyasını imaja göm
          e2cp build.prop system_raw.img:/build.prop
          e2cp build.prop system_raw.img:/system/build.prop || true
          e2cp build.prop system_raw.img:/system/etc/build.prop || true
          
          # Tekrar Sparse yap (Cihazın daha rahat okuması için)
          img2simg system_raw.img system.img

      - name: Finalize Package
        run: |
          mkdir output
          mv system.img output/
          mv boot.img output/
          # Eğer varsa flash scriptlerini (META-INF) ekle
          if [ -d "META-INF" ]; then cp -r META-INF output/; fi
          
          cd output && zip -r ../EfeTech_T113_A10_Final_IMG.zip .

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: EfeTech_T113_A10_Final_IMG.zip
          tag_name: v1.7.0-A10-Final
          name: "T113 Android 10 Hybrid (All IMG Mode)"
          body: "Bütün kaynaklar .img olarak işlendi. T113 için full optimize Android 10 paketi hazır!"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
