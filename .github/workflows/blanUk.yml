name: T113 V16 Nitro Magic Fix

on:
  workflow_dispatch:

jobs:
  efe-lab-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 1. Repoyu Hazirla
        uses: actions/checkout@v4

      - name: 2. Python 3.10 Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Sistem Guncelle ve Araclari Kur
        run: |
          sudo apt-get update
          sudo apt-get install -y brotli zip android-sdk-libsparse-utils curl git
          pip install gdown
          git clone https://github.com/xpirt/img2sdat.git

      - name: 4. Google Drive Muhimmatlarini Cek
        run: |
          gdown --id "1OkFvGvI5TSQtK22Ib73xZNI1g1muBvGE" -O system.img
          gdown --id "1OkFvGvI5TSQtK22Ib73xZNI1g1muBvGE" -O boot.img || echo "Boot yok"

      - name: 5. Imaj Magic Fix (Sparse to Raw)
        run: |
          # HATA BURADA COZULUYOR:
          # img2sdat aracı Android Sparse formatı ister. 
          # Eğer dosya ham (raw) ise onu sparse formatına (0xED26FF3A) çeviriyoruz.
          echo "Imaj formatı kontrol ediliyor..."
          if img2simg system.img system.sparse.img 2>/dev/null; then
            echo "Imaj Raw formatındaydı, Sparse yapıldı."
            mv system.sparse.img system.img
          else
            echo "Imaj zaten Sparse veya baska bir formatta. Manuel kontrol yapiliyor."
            # Hicbir sey yapma, oldugu gibi kalsın
          fi

      - name: 6. Efe Lab: Block-Based OTA Donusumu
        run: |
          # Artik Magic Number hatasi vermemeli
          python3 img2sdat/img2sdat.py system.img -o output -v 4
          echo "Brotli sikistirma basliyor (Level 9)..."
          brotli -9 output/system.new.dat -o output/system.new.dat.br
          rm output/system.new.dat
          touch output/system.patch.dat

      - name: 7. Klasor Yapisini Insa Et
        run: |
          mkdir -p out/install/bin
          mkdir -p out/META-INF/com/android/otacert
          mkdir -p out/META-INF/com/google/android
          mkdir -p out/system
          mv output/system.new.dat.br out/
          mv output/system.transfer.list out/
          mv output/system.patch.dat out/
          mv boot.img out/
          touch out/file_contexts.bin
          echo "# Efe Lab build.prop" > out/system/build.prop
          printf '#!/sbin/sh\necho "Backup Tool"\n' > out/install/bin/backuptool.sh
          printf '#!/sbin/sh\necho "Functions"\n' > out/install/bin/backuptool.functions
          chmod +x out/install/bin/*.sh

      - name: 8. Updater Script Yazimi
        run: |
          FILE="out/META-INF/com/google/android/updater-script"
          echo 'ui_print("--------------------------------------");' > $FILE
          echo 'ui_print("   T113 V16 NITRO - MAGIC FIX         ");' >> $FILE
          echo 'ui_print("        EFE TECH LAB PRO              ");' >> $FILE
          echo 'ui_print("--------------------------------------");' >> $FILE
          echo 'block_image_update("/dev/block/platform/sprd-sdhci.3/by-name/system", package_extract_file("system.transfer.list"), "system.new.dat.br", "system.patch.dat");' >> $FILE
          echo 'package_extract_file("boot.img", "/dev/block/platform/sprd-sdhci.3/by-name/boot");' >> $FILE
          echo 'ui_print("ISLEM TAMAM! EFE LAB SUNAR.");' >> $FILE

      - name: 9. Update-Binary ve Metadata Hazirla
        run: |
          printf '#!/sbin/sh\n/sbin/edify -s "$1" "$2" "$3"\n' > out/META-INF/com/google/android/update-binary
          chmod +x out/META-INF/com/google/android/update-binary
          touch out/META-INF/com/android/metadata
          touch out/META-INF/com/android/otacert/otacert

      - name: 10. ZIP Paketleme ve Release
        run: |
          cd out && zip -9 -r ../T113_V16_Magic_Success.zip .
          
      - name: 11. Efe Lab Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v16.0-magic"
          name: "T113 V16 Nitro (Magic Fix)"
          body: "ValueError: Magic hatası img2simg ile zorunlu Sparse dönüşümü yapılarak giderildi."
          files: T113_V16_Magic_Success.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
