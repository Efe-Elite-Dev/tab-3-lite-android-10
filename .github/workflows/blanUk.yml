name: T113 Efe Tech - Ultimate Force Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Repoyu Getir
        uses: actions/checkout@v4

      - name: 2. Gerekli Araclar
        run: sudo apt-get update && sudo apt-get install -y zip wget curl

      - name: 3. Imajları Drive'dan Zorla Cek
        run: |
          download_drive() {
            FILE_ID=$1
            OUT_NAME=$2
            CONFIRM=$(wget --quiet --save-cookies /tmp/cookies.txt --keep-session-cookies --no-check-certificate "https://docs.google.com/uc?export=download&id=${FILE_ID}" -O- | sed -rn 's/.*confirm=([0-9A-Za-z_]+).*/\1\n/p')
            wget --load-cookies /tmp/cookies.txt "https://docs.google.com/uc?export=download&confirm=${CONFIRM}&id=${FILE_ID}" -O "${OUT_NAME}" || true
            rm -rf /tmp/cookies.txt
          }

          download_drive "1VFLsX7Vkm1a0lv1GXKtLMKuyg20ey1XB" "system.img"
          download_drive "1ykNZsdc9DxcFtwz7SLGRSGkAro5Z25Jv" "boot.img"
          download_drive "1VQkPk84l9n3Uc04aYp3I_eoJIePj06E3" "sprdcp.img"
          download_drive "1wRd-CixOdcYhppNAksnRoNlcyoacFNLk" "sboot2.bin"
          download_drive "1tvkKWkinJUKKLXDwW0x2YRq5GXriqX3y" "sboot.bin"
          download_drive "1lWWUXpxXMihPgMbgg12wH93kXsjD-6BP" "spl.img"

      - name: 4. Dosya Yapilandirma (Binary Bulucu Dahil)
        run: |
          mkdir -p output/META-INF/com/google/android
          
          # Binary dosyasını repoda ara, bulamazsan internetten cek
          BINARY_PATH=$(find . -name "update-binary" | head -n 1)
          if [ -n "$BINARY_PATH" ]; then
            echo "Binary bulundu: $BINARY_PATH"
            cp "$BINARY_PATH" output/META-INF/com/google/android/
          else
            echo "Binary repoda yok, GitHub'dan indiriliyor..."
            wget https://github.com/Efe-Elite-Dev/tab-3-lite-android-10/raw/main/scripts/update-binary -O output/META-INF/com/google/android/update-binary || touch output/META-INF/com/google/android/update-binary
          fi

          # Updater-script (Otomatik Yazim)
          cat <<EOF > output/META-INF/com/google/android/updater-script
          ui_print("================================");
          ui_print("   EFE TECH GALAXY CRUSHER V1   ");
          ui_print("================================");
          package_extract_file("boot.img", "/dev/block/platform/soc/by-name/boot");
          package_extract_file("system.img", "/dev/block/platform/soc/by-name/system");
          ui_print("Kurulum Tamamlandi!");
          EOF

          chmod 755 output/META-INF/com/google/android/update-binary || true

      - name: 5. Paketleme
        run: |
          # Bulunan tum imaj ve bin dosyalarini tasi
          mv *.img output/ 2>/dev/null || true
          mv *.bin output/ 2>/dev/null || true
          cd output
          zip -r9 ../EfeTech_T113_Build_Final.zip .
          cd ..

      - name: 6. GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: EfeTech_T113_Build_Final.zip
          tag_name: "v1.0.0-Elite-Final"
          name: "Efe Tech Elite Build"
          body: "Otomatik dosya bulucu ve Drive bypass aktif."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
