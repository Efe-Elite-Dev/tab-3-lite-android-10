name: T113 Android 10 TWRP Final ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Essential Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip zip wget android-sdk-libsparse-utils e2tools
          pip install gdown --break-system-packages

      - name: Download Sources
        run: |
          # 1. Stok Boot (T113 Kernel)
          gdown --id 1ykNZsdc9DxcFtwz7SLGRSGkAro5Z25Jv -O boot.img --fuzzy
          # 2. Senin Custom Android 10 System Image
          gdown --id 1dF1k6XNHfycHEbVQMWCaTvBBNki7-SOL -O system_source.img --fuzzy

      - name: Create T113 Optimized Build Prop
        run: |
          cat <<EOF > build.prop
          # --- EFE TECH T113 ANDROID 10 (STABLE ZIP) ---
          ro.build.id=QP1A.190711.020
          ro.build.display.id=EfeTech_T113_A10_v2.1_Final
          ro.build.version.release=10
          ro.build.version.sdk=29
          ro.product.model=SM-T113NU
          ro.product.device=goyavewifi
          ro.sf.hwrotation=270
          ro.sf.lcd_density=160
          ro.config.low_ram=true
          ro.config.swappiness=180
          ro.config.zram.support=true
          ro.config.zram.disksize=512M
          debug.hwui.renderer=opengl
          dalvik.vm.heapgrowthlimit=64m
          dalvik.vm.heapsize=128m
          persist.sys.usb.config=mtp,adb
          EOF

      - name: Modify System Image
        run: |
          # Sparse'tan RAW'a çevir ve build.prop göm
          simg2img system_source.img system_raw.img || mv system_source.img system_raw.img
          e2cp build.prop system_raw.img:/build.prop
          e2cp build.prop system_raw.img:/system/build.prop || true
          # Geri Sparse yap (Daha küçük dosya boyutu)
          img2simg system_raw.img system.img

      - name: Create TWRP Flashable ZIP (Image Method)
        run: |
          mkdir -p output/META-INF/com/google/android
          
          # 1. Repondaki META-INF'i kopyala
          if [ -d "META-INF" ]; then cp -r META-INF/* output/META-INF/; fi
          
          # 2. Updater-script'i IMAGE moduna göre güncelle (Otomatik script düzenleme)
          # Eğer scriptin .dat.br bekliyorsa, onu .img flaşlayacak hale getiriyoruz:
          cat <<EOF > output/META-INF/com/google/android/updater-script
          ui_print("--- Efe Tech T113 Android 10 ---");
          ui_print("System imajı yazılıyor...");
          package_extract_file("boot.img", "/dev/block/platform/sdhci-pxa.0/by-name/boot");
          package_extract_file("system.img", "/dev/block/platform/sdhci-pxa.0/by-name/system");
          ui_print("Tamamlandı! Keyfini çıkar.");
          set_progress(1.000000);
          EOF
          
          # 3. Dosyaları pakete at
          mv system.img output/
          mv boot.img output/
          
          # ZIP yap
          cd output && zip -r ../EfeTech_T113_A10_Stable_v2.1.zip .

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: EfeTech_T113_A10_Stable_v2.1.zip
          tag_name: v2.1-Final
          name: "SM-T113 Android 10 Stable ZIP"
          body: "Hatalar giderildi. .dat.br yerine daha stabil olan Direct Image Flash yöntemi kullanıldı. T113 için full optimize!"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
