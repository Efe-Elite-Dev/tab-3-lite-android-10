name: T113 Android 10 Hybrid Ultra Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Essential Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip zip wget android-sdk-libsparse-utils e2tools p7zip-full
          pip install gdown --break-system-packages

      - name: Download Components (Hybrid Mode)
        run: |
          # Drive onay sayfasını geçmek için --fuzzy ve --confirm ekledik
          gdown --id 1VFLsX7Vkm1a0lv1GXKtLMKuyg20ey1XB -O stock_pack.zip --fuzzy
          gdown --id 1dF1k6XNHfycHEbVQMWCaTvBBNki7-SOL -O custom_system.img --fuzzy
          
          # Dosya boyutlarını kontrol et
          ls -lh stock_pack.zip
          ls -lh custom_system.img

      - name: Extract Boot (Safe Mode)
        run: |
          # 7z başarısız olursa bile hata kodunu yutması için '|| true' ekledik
          7z e stock_pack.zip boot.img -y || unzip -o stock_pack.zip boot.img || true
          
          # Eğer boot.img hala yoksa, belki adı farklıdır veya zip bozuktur. 
          # Dosyaları listele ki hatayı görelim.
          if [ ! -f "boot.img" ]; then
            echo "Kritik Hata: boot.img çıkarılamadı. Zip dosyası eksik inmiş olabilir."
            7z l stock_pack.zip || ls -R
            exit 1
          fi

      - name: Create T113 Optimized Build Prop
        run: |
          cat <<EOF > build.prop
          # --- EFE TECH T113 ANDROID 10 HYBRID ---
          ro.build.id=QP1A.190711.020
          ro.build.display.id=EfeTech_T113_A10_Stable_v1.5
          ro.build.version.release=10
          ro.build.version.sdk=29
          ro.product.model=SM-T113NU
          ro.product.device=goyavewifi
          ro.sf.hwrotation=270
          ro.sf.lcd_density=160
          ro.config.low_ram=true
          ro.config.swappiness=180
          ro.config.zram.support=true
          ro.config.zram.disksize=512M
          debug.hwui.renderer=opengl
          dalvik.vm.heapgrowthlimit=64m
          dalvik.vm.heapsize=128m
          persist.sys.usb.config=mtp,adb
          EOF

      - name: Inject & Repack Image
        run: |
          simg2img custom_system.img system_raw.img || mv custom_system.img system_raw.img
          e2cp build.prop system_raw.img:/build.prop
          e2cp build.prop system_raw.img:/system/build.prop || true
          e2cp build.prop system_raw.img:/system/etc/build.prop || true
          img2simg system_raw.img system.img

      - name: Finalize Package
        run: |
          mkdir output
          mv system.img output/
          mv boot.img output/
          if [ -d "META-INF" ]; then cp -r META-INF output/; fi
          cd output && zip -r ../EfeTech_T113_A10_Hybrid.zip .

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: EfeTech_T113_A10_Hybrid.zip
          tag_name: v1.5.0-Final-A10
          name: "T113 Android 10 Hybrid (Stable)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
