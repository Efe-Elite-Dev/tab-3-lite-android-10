name: T113 Android 10 Ultimate Build
on:
  workflow_dispatch:

jobs:
  build-rom:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: 1. Klasör Hiyerarşisini Kur (Invalid Format Çözümü)
        run: |
          mkdir -p build_dir/META-INF/com/google/android
          mkdir -p build_dir/system
          
      - name: 2. ARM32 update-binary İndir (TWRP Uyumluluğu)
        run: |
          # TWRP'nin hata vermemesi için gerçek bir 32-bit binary kullanıyoruz
          wget -O build_dir/META-INF/com/google/android/update-binary "https://raw.githubusercontent.com/osm0sis/AnyKernel3/master/META-INF/com/google/android/update-binary"
          chmod 755 build_dir/META-INF/com/google/android/update-binary

      - name: 3. updater-script Oluştur (Bootloop ve Mount Çözümü)
        run: |
          cat << 'EOF' > build_dir/META-INF/com/google/android/updater-script
          ui_print("***************************************");
          ui_print("   T113 Tab 3 Lite - Android 10        ");
          ui_print("   Builder: Feyzula Efe Tuna           ");
          ui_print("   Max Performance & Stability         ");
          ui_print("***************************************");
          
          ui_print("- Partisyonlar Baglaniyor...");
          run_program("/sbin/busybox", "mount", "/system");
          run_program("/sbin/busybox", "mount", "/data");
          
          ui_print("- Eski Sistem Temizleniyor...");
          delete_recursive("/system");
          
          ui_print("- Yeni Sistem Kuruluyor...");
          package_extract_dir("system", "/system");
          
          ui_print("- Izinler Ayarlaniyor (Bootloop Onleyici)...");
          set_metadata_recursive("/system", "uid", 0, "gid", 0, "dmode", 0755, "fmode", 0644, "capabilities", 0x0, "selabel", "u:object_r:system_file:s0");
          set_metadata_recursive("/system/bin", "uid", 0, "gid", 2000, "dmode", 0755, "fmode", 0755, "capabilities", 0x0, "selabel", "u:object_r:system_file:s0");
          
          ui_print("- Kurulum Tamamlandi! Partisyonlar Ayriliyor...");
          unmount("/system");
          unmount("/data");
          ui_print("***************************************");
          ui_print(" Basariyla Kuruldu! Cihazi Yeniden Baslat. ");
          ui_print("***************************************");
          EOF

      - name: 4. build.prop Optimizasyonu (Max Performans & Low RAM)
        run: |
          cat << 'EOF' > build_dir/system/build.prop
          # T113 Max Performance Tweaks
          ro.config.low_ram=true
          dalvik.vm.heapstartsize=8m
          dalvik.vm.heapgrowthlimit=64m
          dalvik.vm.heapsize=128m
          dalvik.vm.heaptargetutilization=0.75
          dalvik.vm.heapminfree=512k
          dalvik.vm.heapmaxfree=8m
          debug.performance.tuning=1
          video.accelerate.hw=1
          persist.sys.use_dithering=0
          ro.sys.fw.bg_apps_limit=8
          EOF

      - name: 5. Kusursuz ZIP Paketleme (En Önemli Adım)
        run: |
          cd build_dir
          # SADECE İÇERİĞİ zipliyoruz, klasörü değil! Bu TWRP format hatasını çözer.
          zip -r9 ../T113-A10-Elite-ROM.zip ./*

      - name: 6. ROM'u Artifact Olarak Yükle
        uses: actions/upload-artifact@v4
        with:
          name: T113-A10-Elite-ROM
          path: T113-A10-Elite-ROM.zip
